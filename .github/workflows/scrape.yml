name: 每日更新菜單

on:
  schedule:
    - cron: '0 22 * * *'  # 香港時間朝早6點（UTC+8）
  workflow_dispatch:      # 允許手動撳按鈕執行

jobs:
  scrape:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: 安裝 Playwright
        run: |
          pip install playwright
          playwright install chromium
      
      - name: 執行爬蟲
        run: python scraper.py
      
      - name: 提交更改
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add menu.json
          git diff --staged --quiet || git commit -m "更新菜單 $(date +'%Y-%m-%d %H:%M')"
          git push
